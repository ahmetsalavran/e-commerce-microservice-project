name: saga-ms-dev-jpa

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"   # host erişimi
      - "9092:9092"     # container içi
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # 2 listener: internal (docker network), external (host)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - kafka
    entrypoint: [ "/bin/sh","-c" ]
    command: >
      "
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order.confirmed --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic inventory.confirmed --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic inventory.rejected --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic payment.events --partitions 3 --replication-factor 1
      "

  product-listing-db:
    image: postgres:15
    environment:
      POSTGRES_DB: listingdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5437:5432"]
    volumes:
      - listing-db-data:/var/lib/postgresql/data
      - ./db-init/listingdb:/docker-entrypoint-initdb.d:ro

  inventory-db:
    image: postgres:15
    environment:
      POSTGRES_DB: inventorydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5434:5432"]
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
      - ./db-init/inventorydb:/docker-entrypoint-initdb.d:ro

  order-db:
    image: postgres:15
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5433:5432"]
    volumes:
      - order-db-data:/var/lib/postgresql/data
      - ./db-init/orderdb:/docker-entrypoint-initdb.d:ro

  payment-db:
    image: postgres:15
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5435:5432"]
    volumes:
      - payment-db-data:/var/lib/postgresql/data
      - ./db-init/paymentdb:/docker-entrypoint-initdb.d:ro

  orchestrator-db:
    image: postgres:15
    environment:
      POSTGRES_DB: orchestratordb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5436:5432"]
    volumes:
      - orchestrator-db-data:/var/lib/postgresql/data
      - ./db-init/orchestratordb:/docker-entrypoint-initdb.d:ro

  product-listing-service:
    build: ./product-listing-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://product-listing-db:5432/listingdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports: ["8084:8080"]
    depends_on: [product-listing-db, kafka]

  inventory-service:
    build: ./inventory-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://inventory-db:5432/inventorydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports: ["8081:8080"]
    depends_on: [inventory-db, kafka]

  order-service:
    build: ./order-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/orderdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CLIENTS_CATALOG_URL: http://product-listing-service:8080
    ports: ["8082:8080"]
    depends_on: [order-db, kafka]

  payment-service:
    build: ./payment-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-db:5432/paymentdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports: ["8083:8080"]
    depends_on: [payment-db, kafka]

  orchestrator-service:
    build: ./orchestrator-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://orchestrator-db:5432/orchestratordb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports: ["8085:8080"]
    depends_on: [orchestrator-db, kafka]

volumes:
  listing-db-data:
  inventory-db-data:
  order-db-data:
  payment-db-data:
  orchestrator-db-data:
